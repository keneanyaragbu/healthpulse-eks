apiVersion: apps/v1
kind: Deployment
metadata:
  name: healthpulse-web
  namespace: healthpulse
  labels:
    app.kubernetes.io/name: healthpulse-web
    app.kubernetes.io/part-of: healthpulse-platform
    app.kubernetes.io/component: frontend
    environment: dev
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: healthpulse-web
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: healthpulse-web
        app.kubernetes.io/part-of: healthpulse-platform
        app.kubernetes.io/component: frontend
        environment: dev
    spec:
      containers:
        - name: frontend
          image: teamdevius/healthpulse-portal:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
