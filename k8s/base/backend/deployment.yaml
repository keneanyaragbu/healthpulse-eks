apiVersion: apps/v1
kind: Deployment
metadata:
  name: healthpulse-backend
  namespace: healthpulse
  labels:
    app.kubernetes.io/name: healthpulse-backend
    app.kubernetes.io/part-of: healthpulse-platform
    app.kubernetes.io/component: backend
    environment: dev
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: healthpulse-backend
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: healthpulse-backend
        app.kubernetes.io/part-of: healthpulse-platform
        app.kubernetes.io/component: backend
        environment: dev
    spec:
      containers:
        - name: backend
          image: keneanyaragbu/healthpulse-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
